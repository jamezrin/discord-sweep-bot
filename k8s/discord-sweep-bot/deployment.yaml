apiVersion: apps/v1
kind: Deployment
metadata:
  name: discord-sweep-bot
  namespace: discord-sweep-bot
  labels:
    app: discord-sweep-bot
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: discord-sweep-bot
  template:
    metadata:
      labels:
        app: discord-sweep-bot
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: bot
          image: ghcr.io/jamezrin/discord-sweep-bot:latest
          imagePullPolicy: Always
          env:
            - name: DISCORD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: discord-sweep-bot-secret
                  key: DISCORD_TOKEN
            - name: LOG_LEVEL
              value: "info"
            - name: SWEEP_DELAY_MS
              value: "0"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            exec:
              command:
                - pidof
                - node
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
